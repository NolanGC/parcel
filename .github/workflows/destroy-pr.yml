name: Destroy PR Stack

on:
  pull_request:
    types: [closed]

jobs:
  destroy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - name: Compute stage
        id: stage
        run: |
          slug=$(echo "${{ github.head_ref }}" | tr '[:upper:]/_' '[:lower:]--' | tr -cd 'a-z0-9-')
          echo "name=pr-$slug" >> "$GITHUB_OUTPUT"
      - run: bun alchemy destroy --stage ${{ steps.stage.outputs.name }} --yes
        env:
          PLANETSCALE_API_TOKEN_ID: ${{ secrets.PLANETSCALE_API_TOKEN_ID }}
          PLANETSCALE_API_TOKEN: ${{ secrets.PLANETSCALE_API_TOKEN }}
          PLANETSCALE_ORGANIZATION: ${{ secrets.PLANETSCALE_ORGANIZATION }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_WORKERS_SUBDOMAIN: nolangc
