name: Deploy PR Preview

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: deploy-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - name: Compute stage
        id: stage
        run: |
          slug=$(echo "${{ github.head_ref }}" | tr '[:upper:]/_' '[:lower:]--' | tr -cd 'a-z0-9-')
          echo "name=pr-$slug" >> "$GITHUB_OUTPUT"
      - run: bun run clean:web
      - run: bun alchemy deploy --stage ${{ steps.stage.outputs.name }} --yes
        env:
          PLANETSCALE_API_TOKEN_ID: ${{ secrets.PLANETSCALE_API_TOKEN_ID }}
          PLANETSCALE_API_TOKEN: ${{ secrets.PLANETSCALE_API_TOKEN }}
          PLANETSCALE_ORGANIZATION: ${{ secrets.PLANETSCALE_ORGANIZATION }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_WORKERS_SUBDOMAIN: nolangc
      - name: Comment preview URLs
        uses: actions/github-script@v7
        with:
          script: |
            const stage = "${{ steps.stage.outputs.name }}";
            const subdomain = "nolangc";
            const websiteUrl = `https://parcel-web-${stage}.${subdomain}.workers.dev`;
            const apiUrl = `https://parcel-api-${stage}.${subdomain}.workers.dev`;
            const marker = "<!-- alchemy-preview-comment -->";
            const body = [
              marker,
              `**Preview deployed** for stage \`${stage}\``,
              "",
              `- Website: ${websiteUrl}`,
              `- API: ${apiUrl}`,
            ].join("\n");

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find((c) => c.body?.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
